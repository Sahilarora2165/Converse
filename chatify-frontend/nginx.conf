server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Serve React app for all non-matched routes (React Router handles client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API to Spring Boot
    location /api/ {
        proxy_pass http://app:8080/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket + SockJS — must match /ws and all sub-paths (/ws/info, /ws/websocket etc.)
    location ^~ /ws {
        proxy_pass         http://app:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # OAuth2 INITIATION — proxied to Spring Boot
    # Handles /oauth2/authorization/google — Spring redirects user to Google
    location /oauth2/ {
        proxy_pass http://app:8080/oauth2/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth2 CODE EXCHANGE — proxied to Spring Boot
    # Google redirects here with ?code=xxx after user authenticates
    # Spring processes the code, calls OAuth2SuccessHandler, sets cookie, redirects to /oauth2/callback
    location /login/oauth2/ {
        proxy_pass         http://app:8080/login/oauth2/;
        proxy_redirect     off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # OAuth2 CALLBACK — served by React (OAuthCallback.jsx)
    # Spring redirects here after setting the oauth2_pending cookie
    # React calls GET /api/auth/oauth2/token to exchange cookie for JWT tokens
    # NOTE: No fragment, no params — just a clean redirect to this React route
    location = /oauth2/callback {
        try_files $uri /index.html;
    }

    # Uploaded files
    location /uploads/ {
        proxy_pass http://app:8080/uploads/;
        proxy_set_header Host $host;
    }
}