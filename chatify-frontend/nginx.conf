server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router — send all non-file requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API calls to Spring Boot backend
    location /api/ {
        proxy_pass http://app:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket to Spring Boot backend (including SockJS info endpoint)
    location /ws {
        proxy_pass http://app:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Proxy ONLY the OAuth2 authorization initiation to Spring Boot
    # /oauth2/authorization/google — triggers the Google redirect
    # NOTE: /oauth2/callback is intentionally NOT proxied here.
    # After Google redirects back, Spring processes it via /login/oauth2/code/google,
    # then redirects the browser to /auth/callback (a React route served by nginx as SPA).
    location /oauth2/authorization/ {
        proxy_pass http://app:8080/oauth2/authorization/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Google's code callback to Spring Boot
    # Google redirects here after user approves — Spring exchanges code for tokens
    location /login/oauth2/ {
        proxy_pass http://app:8080/login/oauth2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy uploaded files
    location /uploads/ {
        proxy_pass http://app:8080/uploads/;
        proxy_set_header Host $host;
    }
}